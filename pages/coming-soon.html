<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Golfic Neural Nexus</title>
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --mesh-green: #0B3D2E;
            --mesh-gold: rgba(212, 175, 55, 0.15);
            --mesh-white: #FFFFFF;
            --accent-gold: var(--secondary);
        }

        body {
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: var(--font-body);
            color: var(--text-main);
            background: var(--bg-alt);
        }

        /* ETHEREAL MESH BACKGROUND */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(at 0% 0%, var(--mesh-green) 0px, transparent 50%),
                        radial-gradient(at 100% 0%, var(--mesh-gold) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, var(--mesh-green) 0px, transparent 50%),
                        radial-gradient(at 0% 100%, var(--mesh-white) 0px, transparent 50%);
            filter: blur(80px);
            opacity: 0.4;
        }

        body.dark-layout .mesh-bg {
            background: radial-gradient(at 0% 0%, #051a14 0px, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(212, 175, 55, 0.05) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, #051a14 0px, transparent 50%),
                        radial-gradient(at 0% 100%, #111 0px, transparent 50%);
            opacity: 0.8;
        }

        .portal-nav {
            position: fixed;
            top: 40px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: var(--transition);
        }

        .back-link:hover { opacity: 1; transform: translateX(-4px); }

        .sequence-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px 60px;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            color: var(--primary);
            transition: var(--transition);
        }

        body.dark-layout .logo-box {
            color: var(--secondary);
        }

        .logo-box i { color: inherit; width: 28px; height: 28px; }
        .logo-box span { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; color: inherit; }

        .tagline {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 20px;
            transition: var(--transition);
        }

        body.dark-layout .tagline {
            color: #FFFFFF;
        }

        .headline {
            font-family: var(--font-heading);
            font-size: 3.25rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 60px;
            max-width: 800px;
            color: var(--primary);
            transition: var(--transition);
        }

        body.dark-layout .headline {
            color: #FFFFFF;
        }

        .text-accent {
            color: var(--secondary);
        }

        .countdown-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .countdown-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 25px 30px;
            min-width: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body.dark-layout .countdown-card {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .count-num {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent-gold);
            line-height: 1;
            margin-bottom: 8px;
            transition: var(--transition);
        }

        body.dark-layout .count-num {
            color: #FFFFFF;
        }

        .count-label {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .alignment-module {
            width: 100%;
            max-width: 400px;
            margin-bottom: 60px;
        }

        .alignment-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .progress-rail {
            height: 4px;
            background: rgba(var(--text-rgb), 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 88%;
            background: var(--accent-gold);
            border-radius: 10px;
        }

        .waitlist-form {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }

        body.dark-layout .waitlist-form {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .waitlist-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 25px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .waitlist-input:focus { outline: none; }

        .btn-neural {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 15px 35px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-neural:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }

        .frequency-footer {
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* [LOCKED] COMING SOON RESPONSIVENESS (320px - 1440px) */
        @media (max-width: 1024px) {
            .headline { font-size: 2.75rem; }
        }

        @media (max-width: 768px) {
            .portal-nav { top: 20px; left: 20px; right: 20px; }
            .headline { font-size: 2.25rem; margin-bottom: 40px; }
            .countdown-grid { gap: 12px; }
            .countdown-card { padding: 20px; min-width: 80px; }
            .count-num { font-size: 2rem; }
        }

        @media (max-width: 480px) {
            .headline { font-size: 1.85rem; letter-spacing: -1px; }
            .countdown-grid { 
                display: grid; 
                grid-template-columns: repeat(2, 1fr); 
                gap: 15px; 
                width: 100%; 
                max-width: 300px; 
            }
            .waitlist-form {
                flex-direction: column;
                background: transparent;
                border: none;
                padding: 0;
                gap: 15px;
            }
            .waitlist-input {
                background: rgba(255, 255, 255, 0.4);
                height: 56px;
                border-radius: 100px;
                border: 1px solid rgba(255, 255, 255, 0.3);
                width: 100%;
            }
            body.dark-layout .waitlist-input {
                background: rgba(255, 255, 255, 0.03);
            }
            .btn-neural { width: 100%; }
        }
    </style>
</head>
<body class="loading">

    <div class="mesh-bg"></div>

    <nav class="portal-nav">
        <a href="../index.html" class="back-link">
            <i data-lucide="arrow-left"></i> Home
        </a>
        <button id="theme-toggle" class="icon-btn theme-toggle" style="background: transparent;">
            <i data-lucide="moon"></i>
        </button>
    </nav>

    <main class="sequence-container fade-in">
        <a href="../index.html" class="logo-box">
            <i data-lucide="target"></i>
            <span>GOLFIC</span>
        </a>

        <div class="badge badge-outline reveal" style="margin-bottom: 20px;">Next Sequence Loading</div>
        <h1 class="headline reveal">Expanding the <span class="text-accent">Neural Horizon</span></h1>

        <div class="countdown-grid reveal">
            <div class="countdown-card hover-scale">
                <div class="count-num">44</div>
                <div class="count-label">Days</div>
            </div>
            <div class="countdown-card hover-scale">
                <div class="count-num">23</div>
                <div class="count-label">Hours</div>
            </div>
            <div class="countdown-card hover-scale">
                <div class="count-num">59</div>
                <div class="count-label">Mins</div>
            </div>
            <div class="countdown-card hover-scale">
                <div class="count-num">52</div>
                <div class="count-label">Secs</div>
            </div>
        </div>

        <div class="alignment-module reveal">
            <div class="alignment-meta">
                <span>Alignment Status</span>
                <span>88%</span>
            </div>
            <div class="progress-rail">
                <div class="progress-fill"></div>
            </div>
        </div>

        <form class="waitlist-form reveal hover-scale">
            <input type="email" class="waitlist-input" placeholder="Your neural identifier (email)">
            <button type="submit" class="btn-neural">Join Waitlist</button>
        </form>

        <div class="frequency-footer">
            We'll transmit the update directly to your frequency.
        </div>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
